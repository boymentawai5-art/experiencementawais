<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booking Form</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      padding: 20px;
    }
    .container {
      max-width: 600px;
      margin: 50px auto;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    h1 { text-align: center; color: #333; }
    label {
      display: block;
      margin: 15px 0 8px;
      font-weight: bold;
    }
    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 16px;
    }
    .total {
      font-size: 22px;
      font-weight: bold;
      color: #e74c3c;
      margin: 20px 0;
    }
    button {
      width: 100%;
      padding: 15px;
      background: #27ae60;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      cursor: pointer;
      margin-top: 20px;
    }
    button:hover {
      background: #219653;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Form Booking</h1>
    
    <form id="bookingForm">
      <label for="nama">Nama Lengkap</label>
      <input type="text" id="nama" placeholder="Masukkan nama Anda" required>

      <label>Total Pembayaran</label>
      <div class="total" id="totalPrice">Rp 1.250.000</div>

      <button type="submit">Konfirmasi Booking & Bayar</button>
    </form>
  </div>

  <!-- Modal (optional, bisa di-hide via JS) -->
  <div id="bookingModal" class="hidden"></div>

  <script>
    function handleBooking(e) {
      e.preventDefault();

      const nama = document.getElementById('nama').value.trim() || "Customer";
      const total = document.getElementById('totalPrice').textContent;

      const message = `✅ Pesanan dari ${nama} telah diterima!\n\n` +
        `Silakan lakukan transfer ke:\n\n` +
        `🏦 Bank BNI\n` +
        `No. Rekening: 2032986295\n` +
        `Atas Nama: Muhammad Idris\n\n` +
        `Jumlah Transfer: ${total}\n\n` +
        `Setelah transfer, kirim bukti transfer + nama kamu ke WhatsApp:\n` +
        `📱 0852-6875-0602\n\n` +
        `Kami akan konfirmasi dalam 1x24 jam. Terima kasih! 🙏`;

      // Tampilkan alert
      alert(message);

      // Buka WhatsApp otomatis
      const waText = encodeURIComponent(message);
      window.open(`https://wa.me/6285268750602?text=${waText}`, '_blank');

      // Reset form (opsional)
      document.getElementById('bookingForm').reset();
    }

    // Attach event listener
    document.getElementById('bookingForm').addEventListener('submit', handleBooking);
  </script>

</body>
</html>
